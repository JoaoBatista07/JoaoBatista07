name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest


    steps:
      - name: Create dist folder
        run: mkdir -p dist
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: JoaoBatista07
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=green
            dist/github-contribution-grid-snake.gif?palette=github-dark&color_snake=green

    
      - name: Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v2
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


